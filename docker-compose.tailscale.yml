# Override pro deploy na VM ifp-final (host único atrás do Tailscale HTTPS).
# Uso:
#   docker compose -f docker-compose.prod.yml -f docker-compose.tailscale.yml \
#                  --env-file .env.production <cmd>
services:
  web:
    build:
      args:
        # NEXT_PUBLIC_* é assado no build do Next — precisa ser a URL final.
        NEXT_PUBLIC_API_URL: https://ifp-final.taile04c66.ts.net/api/v1

  caddy:
    # Remove o 443 (quem faz HTTPS é o Tailscale serve); fica só HTTP interno na 80.
    ports: !override
      - "80:80"
    # Monta o site público institucional (servido em / pelo Caddyfile).
    volumes:
      - ./site-institucional:/srv/site:ro

  # NOTA (P0.1): o service `migrate` roda APENAS `prisma migrate deploy` (target
  # `migrator` do apps/api/Dockerfile) — ele NÃO chama o seed. As envs SEED_* do
  # seed DEV (famílias/CPFs fictícios, prontuários, fixtures de IDOR) foram
  # removidas daqui para não contaminarem a base de produção.
  #
  # Para criar o Super Admin inicial em PROD, rode o seed MÍNIMO separado:
  #   docker compose ... run --rm \
  #     -e SEED_ADMIN_ONLY=true \
  #     -e SEED_SUPER_ADMIN_EMAIL=... -e SEED_SUPER_ADMIN_PASSWORD=... \
  #     migrate pnpm --filter @ifp/database seed:admin
  # NUNCA rode `pnpm --filter @ifp/database seed` (seed DEV) em produção.
