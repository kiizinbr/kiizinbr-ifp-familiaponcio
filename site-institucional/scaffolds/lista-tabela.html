<!doctype html>
<!--
  IFP CONNECT · SCAFFOLD — Lista / tabela densa (ref. cidadãos)
  Header de página + barra de filtros + busca + tabela com status colorido +
  paginação por cursor. Forke para: profissionais, turmas, usuários, vagas.
-->
<html lang="pt-BR" data-theme="light" data-unit="social">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cidadãos · IFP Connect</title>
    <link rel="stylesheet" href="../ifp-tokens.css" />
    <link rel="stylesheet" href="../ifp-components.css" />
    <link rel="stylesheet" href="scaffold-chrome.css" />
    <style>
      .filterbar {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .filterbar .input-search { width: 300px; }
      .pager {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        border-top: 1px solid var(--line);
        font-size: 12.5px;
        color: var(--text-3);
      }
      .pager .nav { display: flex; gap: 8px; }
    </style>
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="sb-brand">
          <span class="symbol"><img src="../public/logo/ifp-symbol.png" alt="IFP" /></span>
          <b>IFP Connect</b>
        </div>
        <div class="sb-group">Serviço Social</div>
        <a class="nav-item" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1" /><rect x="14" y="3" width="7" height="7" rx="1" /><rect x="3" y="14" width="7" height="7" rx="1" /><rect x="14" y="14" width="7" height="7" rx="1" /></svg> Painel</a>
        <a class="nav-item on" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" /></svg> Cidadãos <span class="count">1.284</span></a>
        <a class="nav-item" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3 8-8" /><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" /></svg> Triagens <span class="count">9</span></a>
        <div style="margin-top: auto"></div>
        <div class="sb-group">Conta</div>
        <a class="nav-item" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4" /><path d="M4 20c0-4 4-6 8-6s8 2 8 6" /></svg> Regina Alves</a>
      </aside>

      <div>
        <header class="topbar">
          <span class="tb-title">Cidadãos</span>
          <span class="spacer"></span>
          <button class="toggle-pill" data-theme-toggle><span class="dot"></span><span data-theme-label>Claro</span></button>
        </header>

        <div class="content">
          <div class="page-head">
            <div>
              <div class="ph-sub">1.284 ativos · 9 triagens pendentes · 41 excluídos</div>
              <h1 class="t-h1">Base de cidadãos</h1>
            </div>
            <div class="actions">
              <button class="btn btn-secondary">Exportar CSV</button>
              <button class="btn btn-primary">+ Novo cidadão</button>
            </div>
          </div>

          <div class="filterbar">
            <div class="input-search">
              <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7" /><path d="m21 21-4.3-4.3" /></svg>
              <input class="input" placeholder="Buscar por nome, CPF, telefone…" />
            </div>
            <select class="select" style="width: auto"><option>Todas as unidades</option><option>Centro Médico</option><option>Capacitação</option></select>
            <select class="select" style="width: auto"><option>Qualquer status</option><option>Ativo</option><option>Em triagem</option><option>Excluído</option></select>
            <span class="badge badge-info" style="margin-left: 4px"><span class="dot"></span> 3 filtros</span>
          </div>

          <div class="table-wrap">
            <table class="tbl">
              <thead>
                <tr><th>Cidadão</th><th>CPF</th><th>Unidade(s)</th><th>Ciclo</th><th>Status</th><th style="text-align: right">Ações</th></tr>
              </thead>
              <tbody id="rows"></tbody>
            </table>
            <div class="pager">
              <span>Mostrando 1–8 de 1.284</span>
              <div class="nav">
                <button class="btn btn-secondary btn-sm" disabled>← Anterior</button>
                <button class="btn btn-secondary btn-sm">Próxima →</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="scaffold-chrome.js"></script>
    <script>
      var data = [
        ["Marcos A. Ferreira", "047.***.***-21", "Centro Médico", "Adulto", "success", "Ativo"],
        ["Joana Ribeiro", "118.***.***-04", "Médico · Social", "Adulto", "success", "Ativo"],
        ["Pedro Nunes (menor)", "—", "Recreativo", "Criança", "info", "Em triagem"],
        ["Lúcia Castro", "302.***.***-77", "Capacitação", "Adulto", "success", "Ativo"],
        ["Antônio Borges", "551.***.***-10", "Esportivo", "Jovem", "warning", "Pendente"],
        ["Rita Fonseca", "229.***.***-63", "Social", "Adulto", "default", "Excluído"],
        ["Sofia Mendes (menor)", "—", "Recreativo", "Criança", "success", "Ativo"],
        ["Carlos Tavares", "884.***.***-38", "Médico", "Idoso", "success", "Ativo"],
      ];
      document.getElementById("rows").innerHTML = data
        .map(function (r) {
          return (
            "<tr><td class='cell-strong'>" + r[0] + "</td><td class='cell-mono'>" + r[1] +
            "</td><td>" + r[2] + "</td><td>" + r[3] + "</td><td><span class='badge badge-" + r[4] +
            "'><span class='dot'></span> " + r[5] + "</span></td><td style='text-align:right'><button class='btn btn-ghost btn-sm'>Abrir →</button></td></tr>"
          );
        })
        .join("");
    </script>
  </body>
</html>
