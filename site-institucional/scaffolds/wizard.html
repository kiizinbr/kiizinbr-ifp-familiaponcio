<!doctype html>
<!--
  IFP CONNECT · SCAFFOLD — Wizard / Stepper (ref. marcar consulta, 4 passos)
  Stepper + conteúdo por passo + navegação. Inclui o "erro de corrida" elegante
  (slot reservado por outra pessoa). Forke para: matrícula, matrícula esportiva.
-->
<html lang="pt-BR" data-theme="light" data-unit="medico">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Marcar consulta · IFP Connect</title>
    <link rel="stylesheet" href="../ifp-tokens.css" />
    <link rel="stylesheet" href="../ifp-components.css" />
    <link rel="stylesheet" href="scaffold-chrome.css" />
    <style>
      .wiz-wrap { max-width: 720px; margin: 0 auto; padding: 32px 24px 80px; }
      .wiz-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-xl); box-shadow: var(--shadow); overflow: hidden; }
      .wiz-head { padding: 22px 26px; border-bottom: 1px solid var(--line); }
      .wiz-body { padding: 26px; min-height: 280px; }
      .wiz-foot { display: flex; gap: 12px; align-items: center; padding: 18px 26px; border-top: 1px solid var(--line); background: var(--surface-2); }
      .pick { display: flex; flex-direction: column; gap: 10px; }
      .opt {
        display: flex; align-items: center; gap: 14px;
        padding: 14px 16px; border: 1px solid var(--line); border-radius: var(--r-md);
        cursor: pointer; transition: border-color var(--t-fast), background var(--t-fast);
      }
      .opt:hover { border-color: var(--accent-line); background: var(--surface-2); }
      .opt.sel { border-color: var(--accent); background: var(--accent-soft); box-shadow: 0 0 0 3px var(--accent-soft); }
      .opt .nm { font-weight: 700; font-size: 14px; }
      .opt .sb { font-size: 12.5px; color: var(--text-3); }
      .opt .check { margin-left: auto; color: var(--accent); opacity: 0; }
      .opt.sel .check { opacity: 1; }
      .slots { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
      .slot {
        text-align: center; padding: 12px 6px; border: 1px solid var(--line); border-radius: var(--r-md);
        font-family: var(--font-mono); font-size: 13px; cursor: pointer; transition: all var(--t-fast);
      }
      .slot:hover { border-color: var(--accent-line); }
      .slot.sel { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); font-weight: 600; }
      .slot.taken { opacity: 0.4; cursor: not-allowed; text-decoration: line-through; }
      .race {
        display: none; gap: 12px; align-items: flex-start;
        background: var(--danger-soft); border: 1px solid color-mix(in srgb, var(--danger) 35%, transparent);
        border-radius: var(--r-md); padding: 14px 16px; margin-bottom: 18px;
      }
      .race.show { display: flex; animation: shake 0.4s; }
      @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
      .race svg { color: var(--danger); flex: none; margin-top: 1px; }
      .summary-row { display: flex; justify-content: space-between; padding: 11px 0; border-bottom: 1px dashed var(--line); font-size: 14px; }
      .summary-row:last-child { border-bottom: 0; }
      .summary-row .k { color: var(--text-3); }
      .summary-row .v { font-weight: 700; }
    </style>
  </head>
  <body>
    <div class="wiz-wrap">
      <div style="display: flex; align-items: center; gap: 11px; margin-bottom: 22px">
        <span style="width: 34px; height: 34px; border-radius: 9px; background: var(--logo-bg); border: 1px solid var(--logo-ring); display: grid; place-items: center; overflow: hidden"><img src="../public/logo/ifp-symbol.png" alt="IFP" style="width: 25px; height: 25px; object-fit: contain" /></span>
        <b style="font-size: 15px; font-weight: 800; letter-spacing: -0.02em">Marcar nova consulta</b>
        <button class="toggle-pill" data-theme-toggle style="margin-left: auto"><span class="dot"></span><span data-theme-label>Claro</span></button>
      </div>

      <div class="wiz-card">
        <div class="wiz-head">
          <div class="stepper" id="stepper">
            <div class="step active" data-s="0"><span class="num">1</span><span class="lbl">Cidadão</span></div>
            <span class="bar"></span>
            <div class="step" data-s="1"><span class="num">2</span><span class="lbl">Especialidade</span></div>
            <span class="bar"></span>
            <div class="step" data-s="2"><span class="num">3</span><span class="lbl">Horário</span></div>
            <span class="bar"></span>
            <div class="step" data-s="3"><span class="num">4</span><span class="lbl">Confirmar</span></div>
          </div>
        </div>
        <div class="wiz-body" id="body"></div>
        <div class="wiz-foot">
          <button class="btn btn-ghost" id="back" disabled>← Voltar</button>
          <span style="flex: 1"></span>
          <span class="micro" id="stepLabel">Passo 1 de 4</span>
          <button class="btn btn-primary" id="next">Continuar →</button>
        </div>
      </div>
    </div>

    <script src="scaffold-chrome.js"></script>
    <script>
      var step = 0;
      var bodyEl = document.getElementById("body");
      var nextBtn = document.getElementById("next");
      var backBtn = document.getElementById("back");

      var views = [
        function () {
          return (
            "<div class='input-search' style='margin-bottom:16px'><svg viewBox='0 0 24 24' width='17' height='17' fill='none' stroke='currentColor' stroke-width='2'><circle cx='11' cy='11' r='7'/><path d='m21 21-4.3-4.3'/></svg><input class='input' placeholder='Buscar por nome, CPF ou telefone…' value='Marcos'/></div>" +
            "<div class='pick'>" +
            opt("Marcos Antônio Ferreira", "047.***.***-21 · 54 anos", true) +
            opt("Marcos Vinícius Souza", "318.***.***-90 · 31 anos", false) +
            "</div>"
          );
        },
        function () {
          return (
            "<div class='pick'>" +
            opt("Clínico Geral", "3 profissionais · próximos slots em 2 dias", true) +
            opt("Cardiologia", "1 profissional · próximos slots em 6 dias", false) +
            opt("Psicologia", "2 profissionais · próximos slots amanhã", false) +
            "</div>"
          );
        },
        function () {
          return (
            "<p class='t-small' style='margin:0 0 14px;color:var(--text-3)'>Slots disponíveis nos próximos 30 dias · Clínico Geral</p>" +
            "<div class='block-label' style='display:flex;align-items:center;gap:8px;margin:0 0 11px'><span class='micro'>Quinta · 04 jun</span></div>" +
            "<div class='slots' style='margin-bottom:18px'>" + slot("08:00") + slot("08:30", true) + slot("09:00") + slot("09:30") + "</div>" +
            "<div class='block-label' style='display:flex;align-items:center;gap:8px;margin:0 0 11px'><span class='micro'>Sexta · 05 jun</span></div>" +
            "<div class='slots'>" + slot("14:00") + slot("14:30") + slot("15:00", true) + slot("15:30") + "</div>"
          );
        },
        function () {
          return (
            "<div class='race' id='race'><svg width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><circle cx='12' cy='12' r='9'/><path d='M12 8v4M12 16h.01'/></svg><div><div style='font-weight:700;font-size:13.5px;color:var(--danger)'>Este horário acabou de ser reservado</div><div style='font-size:12.5px;color:var(--text-2);margin-top:2px'>Outra pessoa confirmou primeiro. Escolha outro slot disponível — sua reserva não foi perdida.</div></div></div>" +
            "<div class='card'><div class='body'>" +
            sumRow("Cidadão", "Marcos Antônio Ferreira") +
            sumRow("Especialidade", "Clínico Geral") +
            sumRow("Profissional", "Dr. João Silva") +
            sumRow("Data e hora", "Qui 04/06 · 09:00") +
            "</div></div>" +
            "<div class='field-group' style='margin-top:16px;margin-bottom:0'><label class='label'>Observação (opcional)</label><textarea class='textarea' style='min-height:70px' placeholder='Motivo, encaminhamento…'></textarea></div>"
          );
        },
      ];

      function opt(nm, sb, sel) {
        return "<label class='opt" + (sel ? " sel" : "") + "' onclick=\"this.parentNode.querySelectorAll('.opt').forEach(function(o){o.classList.remove('sel')});this.classList.add('sel')\"><div><div class='nm'>" + nm + "</div><div class='sb'>" + sb + "</div></div><span class='check'><svg width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.4'><path d='M20 6 9 17l-5-5'/></svg></span></label>";
      }
      function slot(t, taken) {
        if (taken) return "<div class='slot taken'>" + t + "</div>";
        return "<div class='slot' onclick=\"document.querySelectorAll('.slot').forEach(function(s){s.classList.remove('sel')});this.classList.add('sel')\">" + t + "</div>";
      }
      function sumRow(k, v) { return "<div class='summary-row'><span class='k'>" + k + "</span><span class='v'>" + v + "</span></div>"; }

      function render() {
        bodyEl.innerHTML = views[step]();
        document.querySelectorAll("#stepper .step").forEach(function (s, i) {
          s.classList.toggle("active", i === step);
          s.classList.toggle("done", i < step);
          if (i < step) s.querySelector(".num").innerHTML = "✓";
          else s.querySelector(".num").textContent = i + 1;
        });
        document.getElementById("stepLabel").textContent = "Passo " + (step + 1) + " de 4";
        backBtn.disabled = step === 0;
        nextBtn.textContent = step === 3 ? "Confirmar reserva ✓" : "Continuar →";
      }
      nextBtn.addEventListener("click", function () {
        if (step < 3) { step++; render(); }
        else {
          // demonstra o erro de corrida com elegância
          var race = document.getElementById("race");
          if (race) { race.classList.add("show"); race.scrollIntoView ? null : null; }
        }
      });
      backBtn.addEventListener("click", function () { if (step > 0) { step--; render(); } });
      render();
    </script>
  </body>
</html>
