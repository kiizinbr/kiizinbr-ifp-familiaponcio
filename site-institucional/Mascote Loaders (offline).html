  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

12, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* === 1. PALETA CANÔNICA DO BRANDBOOK (apêndice A) ====================== */\n  --ifp-orange-500: #ff772e; /* ação primária, CTAs, estados ativos        */\n  --ifp-orange-700: #c24d0f; /* forte / hover                              */\n  --ifp-brown-900: #752c05; /* headlines, manchetes, mascote (leão)        */\n  --ifp-teal-500: #10c2bb; /* claro — success/info                        */\n  --ifp-teal-700: #007571; /* escuro — saúde/médico, success strong       */\n  --ifp-ink: #4a4a49; /* body text, cinza institucional               */\n  --ifp-muted: #6b6b6b; /* texto secundário                            */\n  --ifp-white: #ffffff;\n  --ifp-surface-50: #fafaf9; /* fundo de página                           */\n  --ifp-surface-100: #f4f4f2; /* fundo de card sutil                      */\n  --ifp-surface-200: #e5e4e1; /* bordas / divisores                       */\n  --ifp-danger: #ba1a1a; /* erro                                          */\n  --ifp-warning: #b45309; /* alerta                                        */\n\n  /* RGB triplets (paridade com globals.css → rgb(var(--x) / .12)) --------- */\n  --ifp-orange-500-rgb: 255 119 46;\n  --ifp-orange-700-rgb: 194 77 15;\n  --ifp-brown-900-rgb: 117 44 5;\n  --ifp-teal-500-rgb: 16 194 187;\n  --ifp-teal-700-rgb: 0 117 113;\n  --ifp-ink-rgb: 74 74 73;\n\n  /* === 2. SOTAQUE DE COR POR UNIDADE (login = cerimonial; app = discreto) = */\n  --u-medico: #007571; /* saúde / cuidado          */\n  --u-medico-2: #10c2bb;\n  --u-capacitacao: #ff772e; /* aprendizado / energia  */\n  --u-capacitacao-2: #c24d0f;\n  --u-esportivo: #c24d0f; /* movimento / fogo         */\n  --u-esportivo-2: #752c05;\n  --u-recreativo: #10c2bb; /* alegria / leveza        */\n  --u-recreativo-2: #007571;\n  --u-poncio: #752c05; /* sobriedade / autoridade    */\n  --u-poncio-2: #4a4a49;\n  --u-social: #4a4a49; /* transversal                */\n  --u-social-2: #6b6b6b;\n  --unit: var(--ifp-teal-700); /* default; sobrescrito por [data-unit] */\n  --unit-2: var(--ifp-teal-500);\n\n  /* === 4. ESCALAS ======================================================= */\n  /* Espaçamento — base 4px */\n  --sp-1: 4px;\n  --sp-2: 8px;\n  --sp-3: 12px;\n  --sp-4: 16px;\n  --sp-5: 20px;\n  --sp-6: 24px;\n  --sp-8: 32px;\n  --sp-10: 40px;\n  --sp-12: 48px;\n  --sp-16: 64px;\n\n  /* Raio */\n  --r-sm: 7px;\n  --r-md: 10px;\n  --r-lg: 14px;\n  --r-xl: 20px;\n  --r-full: 999px;\n\n  /* Tipografia */\n  --font-ui: \"Hanken Grotesk\", ui-sans-serif, system-ui, -apple-system, sans-serif;\n  --font-mono: \"IBM Plex Mono\", ui-monospace, \"SFMono-Regular\", monospace;\n\n  /* Motion */\n  --t-fast: 120ms ease-out;\n  --t-base: 200ms ease-out;\n  --t-slow: 320ms ease-out;\n}\n\n/* === 3. CAMADA SEMÂNTICA — TEMA CLARO ===================================== */\n:root,\nhtml[data-theme=\"light\"] {\n  --bg: #e7eaea; /* canvas \"meio termo\": dimmed, cards brancos flutuam por cima */\n  --bg-grid: rgba(74, 74, 73, 0.04);\n  --surface: #ffffff;\n  --surface-2: #f6f8f8;\n  --surface-sunken: #edf0f0;\n  --line: #dfe3e3;\n  --line-strong: #ccd2d2;\n  --text: #1b1d1d;\n  --text-2: #4a4a49;\n  --text-3: #82888a;\n  --accent: var(--ifp-teal-700); /* acento de SISTEMA (saúde/ativo)     */\n  --accent-soft: rgba(0, 117, 113, 0.09);\n  --accent-line: rgba(0, 117, 113, 0.28);\n  --live: var(--ifp-orange-500); /* sinal vivo: agora / urgência         */\n  --live-soft: rgba(255, 119, 46, 0.12);\n  --warn: #b45309;\n  --warn-soft: rgba(180, 83, 9, 0.12);\n  --danger: #ba1a1a;\n  --danger-soft: rgba(186, 26, 26, 0.09);\n  --ok: var(--ifp-teal-700);\n  --ok-soft: rgba(0, 117, 113, 0.1);\n  --shadow: 0 1px 2px rgba(20, 22, 22, 0.04), 0 8px 24px rgba(20, 22, 22, 0.05);\n  --shadow-pop: 0 12px 40px rgba(20, 22, 22, 0.1);\n  --logo-bg: #fff;\n  --logo-ring: var(--line);\n  color-scheme: light;\n}\n\n/* === 3. CAMADA SEMÂNTICA — TEMA ESCURO ==================================== */\nhtml[data-theme=\"dark\"] {\n  --bg: #0e1011;\n  --bg-grid: rgba(255, 255, 255, 0.025);\n  --surface: #16191a;\n  --surface-2: #1b1f20;\n  --surface-sunken: #101314;\n  --line: #262b2c;\n  --line-strong: #333a3b;\n  --text: #ecefef;\n  --text-2: #aab2b2;\n  --text-3: #6f7878;\n  --accent: var(--ifp-teal-500);\n  --accent-soft: rgba(16, 194, 187, 0.12);\n  --accent-line: rgba(16, 194, 187, 0.34);\n  --live: #ff8c4d;\n  --live-soft: rgba(255, 119, 46, 0.16);\n  --warn: #f0a850;\n  --warn-soft: rgba(240, 168, 80, 0.14);\n  --danger: #ff6b6b;\n  --danger-soft: rgba(255, 107, 107, 0.12);\n  --ok: var(--ifp-teal-500);\n  --ok-soft: rgba(16, 194, 187, 0.12);\n  --shadow: 0 1px 2px rgba(0, 0, 0, 0.4), 0 12px 32px rgba(0, 0, 0, 0.45);\n  --shadow-pop: 0 16px 48px rgba(0, 0, 0, 0.6);\n  --logo-bg: #f6f7f7;\n  --logo-ring: #2c3233;\n  color-scheme: dark;\n}\n\n/* === SOTAQUE DE UNIDADE (define --unit p/ faixas, selos, agenda) ========== */\n[data-unit=\"medico\"] {\n  --unit: var(--u-medico);\n  --unit-2: var(--u-medico-2);\n}\n[data-unit=\"capacitacao\"] {\n  --unit: var(--u-capacitacao);\n  --unit-2: var(--u-capacitacao-2);\n}\n[data-unit=\"esportivo\"] {\n  --unit: var(--u-esportivo);\n  --unit-2: var(--u-esportivo-2);\n}\n[data-unit=\"recreativo\"] {\n  --unit: var(--u-recreativo);\n  --unit-2: var(--u-recreativo-2);\n}\n[data-unit=\"poncio\"] {\n  --unit: var(--u-poncio);\n  --unit-2: var(--u-poncio-2);\n}\n[data-unit=\"social\"] {\n  --unit: var(--u-social);\n  --unit-2: var(--u-social-2);\n}\n\n/* === ACENTO SEGUE A UNIDADE ==============================================\n   Opt-in: em telas de uma unidade, ponha [data-unit-accent] junto de\n   [data-unit]. Isso remapeia o acento de SISTEMA (teal) para a cor da\n   unidade — botões primários, item de menu ativo, ícones de KPI, foco,\n   links e ticks passam a carregar a identidade da unidade.\n   Mantém \"uma marca só\": muda só o acento, não a tipografia/layout/fundo. */\n[data-unit-accent] {\n  --accent: var(--unit);\n  --accent-soft: color-mix(in srgb, var(--unit) 11%, transparent);\n  --accent-line: color-mix(in srgb, var(--unit) 32%, transparent);\n}\n\n/* ============================================================================\n   BASE / RESET\n   ============================================================================ */\n* {\n  box-sizing: border-box;\n}\nhtml {\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\nbody {\n  margin: 0;\n  font-family: var(--font-ui);\n  background-color: var(--bg);\n  background-image: linear-gradient(var(--bg-grid) 1px, transparent 1px),\n    linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);\n  background-size: 32px 32px;\n  color: var(--text);\n  line-height: 1.45;\n  letter-spacing: -0.01em;\n}\n\n/* ---- Tipografia: escala formal ------------------------------------------- */\n.t-display {\n  font-size: 38px;\n  font-weight: 800;\n  letter-spacing: -0.03em;\n  line-height: 1.05;\n}\n.t-h1 {\n  font-size: 28px;\n  font-weight: 800;\n  letter-spacing: -0.025em;\n  line-height: 1.12;\n}\n.t-h2 {\n  font-size: 21px;\n  font-weight: 800;\n  letter-spacing: -0.02em;\n  line-height: 1.2;\n}\n.t-h3 {\n  font-size: 16px;\n  font-weight: 700;\n  letter-spacing: -0.01em;\n}\n.t-body {\n  font-size: 14.5px;\n  font-weight: 400;\n  line-height: 1.55;\n}\n.t-small {\n  font-size: 13px;\n  font-weight: 500;\n  color: var(--text-2);\n}\n.mono {\n  font-family: var(--font-mono);\n  font-feature-settings: \"tnum\" 1;\n}\n/* Microlabel: o \"carimbo\" de UI clínica — caixa-alta, mono, tracking largo */\n.micro {\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  font-weight: 500;\n  letter-spacing: 0.13em;\n  text-transform: uppercase;\n  color: var(--text-3);\n}\n\n/* ---- Utilitários de cor de texto ----------------------------------------- */\n.text-2 {\n  color: var(--text-2);\n}\n.text-3 {\n  color: var(--text-3);\n}\n.text-accent {\n  color: var(--accent);\n}\n.text-unit {\n  color: var(--unit);\n}\n\n/* ---- A11y: foco visível e redução de movimento --------------------------- */\n:focus-visible {\n  outline: 2px solid var(--accent);\n  outline-offset: 2px;\n  border-radius: 4px;\n}\n@media (prefers-reduced-motion: reduce) {\n  *,\n  *::before,\n  *::after {\n    animation: none !important;\n    transition: none !important;\n  }\n}\n<\u002Fstyle>\n    <style>/* ============================================================================\n   IFP CONNECT · Design Kit — COMPONENTES\n   Requer ifp-tokens.css. Cada componente cobre estados: default/hover/focus/\n   disabled/loading quando aplicável. Densidade alta (equipe) por padrão.\n   ============================================================================ */\n\n/* ===== CARD ============================================================== */\n.card {\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: var(--r-lg);\n  box-shadow: var(--shadow);\n}\n.card > header {\n  display: flex;\n  align-items: center;\n  gap: var(--sp-2);\n  padding: 13px 15px;\n  border-bottom: 1px solid var(--line);\n}\n.card > header .tick {\n  width: 3px;\n  height: 13px;\n  border-radius: 2px;\n  background: var(--accent);\n  flex: none;\n}\n.card > header .tick.unit {\n  background: var(--unit);\n}\n.card > header h3 {\n  margin: 0;\n  font-size: 12.5px;\n  font-weight: 700;\n  letter-spacing: 0.02em;\n}\n.card > header .act {\n  margin-left: auto;\n  font-size: 11px;\n  font-weight: 600;\n  color: var(--accent);\n  cursor: pointer;\n  background: none;\n  border: 0;\n  font-family: inherit;\n}\n.card .body {\n  padding: 14px 15px;\n}\n/* Faixa de unidade no topo do card (sinal funcional discreto) */\n.card.unit-strip {\n  position: relative;\n  overflow: hidden;\n}\n.card.unit-strip::before {\n  content: \"\";\n  position: absolute;\n  inset: 0 0 auto 0;\n  height: 3px;\n  background: linear-gradient(90deg, var(--unit), var(--unit-2));\n}\n.card-hover {\n  transition: transform var(--t-base), box-shadow var(--t-base), border-color var(--t-base);\n}\n.card-hover:hover {\n  transform: translateY(-2px);\n  box-shadow: var(--shadow-pop);\n  border-color: var(--line-strong);\n}\n\n/* ===== BOTÕES ============================================================ */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: 8px;\n  border: 1px solid transparent;\n  border-radius: var(--r-md);\n  font-family: inherit;\n  font-weight: 700;\n  font-size: 14px;\n  line-height: 1;\n  padding: 11px 16px;\n  cursor: pointer;\n  transition: transform var(--t-fast), box-shadow var(--t-fast), background var(--t-fast),\n    border-color var(--t-fast);\n  white-space: nowrap;\n  user-select: none;\n}\n.btn:active {\n  transform: translateY(1px);\n}\n.btn:disabled,\n.btn[aria-disabled=\"true\"] {\n  opacity: 0.5;\n  cursor: not-allowed;\n  transform: none;\n}\n.btn-sm {\n  padding: 8px 12px;\n  font-size: 12.5px;\n  border-radius: var(--r-sm);\n}\n.btn-lg {\n  padding: 13px 22px;\n  font-size: 15px;\n  border-radius: var(--r-md);\n}\n/* primary — acento de sistema (teal); muda p/ --unit dentro de [data-unit] se desejar */\n.btn-primary {\n  color: #fff;\n  background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 92%, #fff), var(--accent));\n  box-shadow: 0 1px 0 rgba(255, 255, 255, 0.25) inset,\n    0 6px 18px color-mix(in srgb, var(--accent) 32%, transparent);\n}\nhtml[data-theme=\"dark\"] .btn-primary {\n  color: #04201f;\n}\n.btn-primary:hover {\n  box-shadow: 0 1px 0 rgba(255, 255, 255, 0.25) inset,\n    0 10px 26px color-mix(in srgb, var(--accent) 42%, transparent);\n}\n.btn-unit {\n  color: #fff;\n  background: linear-gradient(180deg, color-mix(in srgb, var(--unit) 92%, #fff), var(--unit));\n  box-shadow: 0 6px 18px color-mix(in srgb, var(--unit) 32%, transparent);\n}\n.btn-secondary {\n  color: var(--text);\n  background: var(--surface);\n  border-color: var(--line-strong);\n}\n.btn-secondary:hover {\n  border-color: var(--accent-line);\n  background: var(--surface-2);\n}\n.btn-ghost {\n  color: var(--text-2);\n  background: transparent;\n}\n.btn-ghost:hover {\n  background: var(--surface-sunken);\n  color: var(--text);\n}\n.btn-danger {\n  color: #fff;\n  background: var(--danger);\n}\n.btn-danger:hover {\n  filter: brightness(1.06);\n}\n.btn-block {\n  width: 100%;\n}\n/* loading: spinner */\n.btn.is-loading {\n  color: transparent !important;\n  pointer-events: none;\n  position: relative;\n}\n.btn.is-loading::after {\n  content: \"\";\n  position: absolute;\n  width: 15px;\n  height: 15px;\n  border: 2px solid currentColor;\n  border-top-color: transparent;\n  border-radius: 50%;\n  animation: ifp-spin 0.7s linear infinite;\n  color: #fff;\n}\n@keyframes ifp-spin {\n  to {\n    transform: rotate(360deg);\n  }\n}\n\n/* ===== INPUT / FORM ====================================================== */\n.field-group {\n  display: flex;\n  flex-direction: column;\n  gap: 6px;\n  margin-bottom: var(--sp-4);\n}\n.label {\n  font-size: 12.5px;\n  font-weight: 600;\n  color: var(--text-2);\n}\n.label .req {\n  color: var(--danger);\n}\n.input,\n.select,\n.textarea {\n  width: 100%;\n  font-family: inherit;\n  font-size: 14px;\n  color: var(--text);\n  background: var(--surface-2);\n  border: 1px solid var(--line);\n  border-radius: var(--r-md);\n  padding: 11px 13px;\n  outline: none;\n  transition: border-color var(--t-base), box-shadow var(--t-base), background var(--t-base);\n}\n.input::placeholder,\n.textarea::placeholder {\n  color: var(--text-3);\n}\n.input:focus,\n.select:focus,\n.textarea:focus {\n  border-color: var(--accent-line);\n  box-shadow: 0 0 0 3px var(--accent-soft);\n  background: var(--surface);\n}\n.input:disabled {\n  opacity: 0.55;\n  cursor: not-allowed;\n}\n.input.is-error,\n.textarea.is-error {\n  border-color: color-mix(in srgb, var(--danger) 55%, var(--line));\n  box-shadow: 0 0 0 3px var(--danger-soft);\n}\n.field-error {\n  font-size: 12px;\n  color: var(--danger);\n  display: flex;\n  align-items: center;\n  gap: 5px;\n}\n.field-hint {\n  font-size: 12px;\n  color: var(--text-3);\n}\n.textarea {\n  min-height: 110px;\n  resize: vertical;\n  line-height: 1.55;\n}\n.input-search {\n  position: relative;\n}\n.input-search .input {\n  padding-left: 36px;\n}\n.input-search svg {\n  position: absolute;\n  left: 12px;\n  top: 50%;\n  transform: translateY(-50%);\n  color: var(--text-3);\n  pointer-events: none;\n}\n\n/* ===== BADGE / STATUS ==================================================== */\n.badge {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  padding: 4px 10px;\n  border-radius: var(--r-full);\n  font-size: 11.5px;\n  font-weight: 700;\n  letter-spacing: 0.01em;\n  border: 1px solid transparent;\n  white-space: nowrap;\n}\n.badge .dot {\n  width: 7px;\n  height: 7px;\n  border-radius: 50%;\n  background: currentColor;\n  flex: none;\n}\n.badge-default {\n  color: var(--text-2);\n  background: var(--surface-sunken);\n  border-color: var(--line);\n}\n.badge-success {\n  color: var(--ok);\n  background: var(--ok-soft);\n  border-color: color-mix(in srgb, var(--ok) 28%, transparent);\n}\n.badge-info {\n  color: var(--accent);\n  background: var(--accent-soft);\n  border-color: var(--accent-line);\n}\n.badge-warning {\n  color: var(--warn);\n  background: var(--warn-soft);\n  border-color: color-mix(in srgb, var(--warn) 32%, transparent);\n}\n.badge-danger {\n  color: var(--danger);\n  background: var(--danger-soft);\n  border-color: color-mix(in srgb, var(--danger) 30%, transparent);\n}\n.badge-live {\n  color: var(--live);\n  background: var(--live-soft);\n  border-color: color-mix(in srgb, var(--live) 30%, transparent);\n}\n.badge-unit {\n  color: var(--unit);\n  background: color-mix(in srgb, var(--unit) 11%, transparent);\n  border-color: color-mix(in srgb, var(--unit) 30%, transparent);\n}\n/* pulso \"ao vivo\" (em atendimento / agora) */\n.pulse {\n  width: 8px;\n  height: 8px;\n  border-radius: 50%;\n  background: var(--live);\n  box-shadow: 0 0 0 0 color-mix(in srgb, var(--live) 60%, transparent);\n  animation: ifp-pulse 1.9s infinite;\n  flex: none;\n}\n@keyframes ifp-pulse {\n  0% {\n    box-shadow: 0 0 0 0 color-mix(in srgb, var(--live) 55%, transparent);\n  }\n  70% {\n    box-shadow: 0 0 0 7px transparent;\n  }\n  100% {\n    box-shadow: 0 0 0 0 transparent;\n  }\n}\n\n/* ===== CHIP ============================================================== */\n.chip {\n  font-size: 12px;\n  font-weight: 600;\n  padding: 4px 9px;\n  border-radius: var(--r-sm);\n  background: var(--surface-sunken);\n  border: 1px solid var(--line);\n  color: var(--text-2);\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n}\n.chip-danger {\n  background: var(--danger-soft);\n  border-color: color-mix(in srgb, var(--danger) 30%, transparent);\n  color: var(--danger);\n}\n.chip-accent {\n  background: var(--accent-soft);\n  border-color: var(--accent-line);\n  color: var(--accent);\n}\n.chip-mono {\n  font-family: var(--font-mono);\n}\n.chips {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 6px;\n}\n\n/* ===== AVATAR ============================================================ */\n.avatar {\n  width: 42px;\n  height: 42px;\n  border-radius: 12px;\n  background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 55%, var(--ifp-brown-900)));\n  color: #fff;\n  display: grid;\n  place-items: center;\n  font-weight: 800;\n  font-size: 15px;\n  letter-spacing: 0.02em;\n  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15);\n  flex: none;\n}\n.avatar.sm {\n  width: 32px;\n  height: 32px;\n  font-size: 12px;\n  border-radius: 9px;\n}\n.avatar.unit {\n  background: linear-gradient(135deg, var(--unit), var(--unit-2));\n}\n\n/* ===== KPI CARD ========================================================== */\n.kpi {\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: var(--r-lg);\n  padding: 16px 17px;\n  box-shadow: var(--shadow);\n  display: flex;\n  flex-direction: column;\n  gap: 8px;\n  transition: transform var(--t-base), box-shadow var(--t-base), border-color var(--t-base);\n}\n.kpi.drill {\n  cursor: pointer;\n}\n.kpi.drill:hover {\n  transform: translateY(-2px);\n  box-shadow: var(--shadow-pop);\n  border-color: var(--accent-line);\n}\n.kpi .kpi-top {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n}\n.kpi .kpi-val {\n  font-family: var(--font-mono);\n  font-size: 30px;\n  font-weight: 600;\n  letter-spacing: -0.02em;\n  line-height: 1;\n}\n.kpi .kpi-val .u {\n  font-size: 14px;\n  color: var(--text-3);\n  font-weight: 500;\n}\n.kpi .kpi-delta {\n  font-size: 12px;\n  font-weight: 700;\n  display: inline-flex;\n  align-items: center;\n  gap: 3px;\n}\n.kpi .kpi-delta.up {\n  color: var(--ok);\n}\n.kpi .kpi-delta.down {\n  color: var(--danger);\n}\n.kpi .kpi-ico {\n  width: 32px;\n  height: 32px;\n  border-radius: 9px;\n  display: grid;\n  place-items: center;\n  background: var(--accent-soft);\n  color: var(--accent);\n  flex: none;\n}\n\n/* ===== TABELA DENSA ====================================================== */\n.table-wrap {\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: var(--r-lg);\n  box-shadow: var(--shadow);\n  overflow: hidden;\n}\ntable.tbl {\n  width: 100%;\n  border-collapse: collapse;\n  font-size: 13.5px;\n}\ntable.tbl thead th {\n  text-align: left;\n  font-family: var(--font-mono);\n  font-size: 10.5px;\n  font-weight: 500;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  color: var(--text-3);\n  padding: 11px 16px;\n  border-bottom: 1px solid var(--line);\n  background: var(--surface-2);\n  white-space: nowrap;\n}\ntable.tbl tbody td {\n  padding: 12px 16px;\n  border-bottom: 1px solid var(--line);\n  vertical-align: middle;\n}\ntable.tbl tbody tr:last-child td {\n  border-bottom: 0;\n}\ntable.tbl tbody tr {\n  transition: background var(--t-fast);\n}\ntable.tbl tbody tr:hover {\n  background: var(--surface-sunken);\n}\ntable.tbl .cell-strong {\n  font-weight: 700;\n  color: var(--text);\n}\ntable.tbl .cell-mono {\n  font-family: var(--font-mono);\n  color: var(--text-2);\n}\n\n/* ===== TIMELINE ========================================================== */\n.timeline {\n  position: relative;\n  padding-left: 16px;\n}\n.timeline::before {\n  content: \"\";\n  position: absolute;\n  left: 4px;\n  top: 4px;\n  bottom: 4px;\n  width: 1.5px;\n  background: var(--line-strong);\n}\n.tl-item {\n  position: relative;\n  padding: 0 0 16px 0;\n}\n.tl-item:last-child {\n  padding-bottom: 0;\n}\n.tl-item::before {\n  content: \"\";\n  position: absolute;\n  left: -14.5px;\n  top: 4px;\n  width: 8px;\n  height: 8px;\n  border-radius: 50%;\n  background: var(--surface);\n  border: 2px solid var(--accent);\n}\n.tl-item.live::before {\n  border-color: var(--live);\n  background: var(--live);\n}\n.tl-item .tl-when {\n  font-size: 11px;\n  color: var(--text-3);\n  font-family: var(--font-mono);\n}\n.tl-item .tl-title {\n  font-size: 12.5px;\n  font-weight: 700;\n  margin: 2px 0 1px;\n}\n.tl-item .tl-meta {\n  font-size: 11px;\n  color: var(--accent);\n  font-weight: 600;\n}\n.tl-item .tl-body {\n  font-size: 12px;\n  color: var(--text-2);\n  margin-top: 3px;\n}\n\n/* ===== STEPPER =========================================================== */\n.stepper {\n  display: flex;\n  align-items: center;\n  gap: 0;\n}\n.step {\n  display: flex;\n  align-items: center;\n  gap: 9px;\n  flex: 1;\n}\n.step:last-child {\n  flex: none;\n}\n.step .num {\n  width: 28px;\n  height: 28px;\n  border-radius: 50%;\n  display: grid;\n  place-items: center;\n  font-size: 13px;\n  font-weight: 700;\n  font-family: var(--font-mono);\n  border: 1.5px solid var(--line-strong);\n  color: var(--text-3);\n  background: var(--surface);\n  flex: none;\n  transition: all var(--t-base);\n}\n.step .lbl {\n  font-size: 13px;\n  font-weight: 600;\n  color: var(--text-3);\n  white-space: nowrap;\n}\n.step .bar {\n  flex: 1;\n  height: 1.5px;\n  background: 100%;\n  max-width: 440px;\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: var(--r-xl);\n  box-shadow: var(--shadow-pop);\n  animation: ifp-modal-in var(--t-slow) both;\n  overflow: hidden;\n}\n@keyframes ifp-modal-in {\n  from {\n    opacity: 0;\n    transform: translateY(10px) scale(0.97);\n  }\n}\n.modal .m-head {\n  padding: 18px 20px 4px;\n}\n.modal .m-title {\n  font-size: 17px;\n  font-weight: 800;\n  letter-spacing: -0.02em;\n}\n.modal .m-body {\n  padding: 12px 20px 18px;\n  font-size: 13.5px;\n  color: var(--text-2);\n  line-height: 1.55;\n}\n.modal .m-foot {\n  display: flex;\n  gap: 10px;\n  justify-content: flex-end;\n  padding: 14px 20px;\n  border-top: 1px solid var(--line);\n  background: var(--surface-2);\n}\n\n/* ===== EMPTY STATE (mascote a ~30%) ====================================== */\n.empty {\n  text-align: center;\n  padding: 48px 24px;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 6px;\n}\n.empty img {\n  width: 96px;\n  height: 96px;\n  object-fit: contain;\n  opacity: 0.3;\n  margin-bottom: 8px;\n}\n.empty .e-title {\n  font-size: 16px;\n  font-weight: 700;\n}\n.empty .e-msg {\n  font-size: 13.5px;\n  color: var(--text-3);\n  max-width: 320px;\n  line-height: 1.5;\n}\n\n/* ===== SEGMENTED / TOGGLE TEMA =========================================== */\n.toggle-pill {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  border: 1px solid var(--line-strong);\n  background: var(--surface);\n  color: var(--text-2);\n  border-radius: var(--r-full);\n  padding: 7px 13px;\n  font-family: inherit;\n  font-size: 12px;\n  font-weight: 600;\n  cursor: pointer;\n  transition: border-color var(--t-base);\n}\n.toggle-pill:hover {\n  border-color: var(--accent-line);\n}\n.toggle-pill .dot {\n  width: 9px;\n  height: 9px;\n  border-radius: 50%;\n  background: var(--accent);\n}\n.segmented {\n  display: inline-flex;\n  background: var(--surface-sunken);\n  border: 1px solid var(--line);\n  border-radius: var(--r-md);\n  padding: 3px;\n  gap: 2px;\n}\n.segmented button {\n  font-family: inherit;\n  font-size: 12.5px;\n  font-weight: 600;\n  color: var(--text-3);\n  background: transparent;\n  border: 0;\n  padding: 6px 12px;\n  border-radius: 7px;\n  cursor: pointer;\n  transition: all var(--t-fast);\n}\n.segmented button.on {\n  color: var(--text);\n  background: var(--surface);\n  box-shadow: var(--shadow);\n}\n\n/* ===== SKELETON / LOADING ================================================ */\n.skel {\n  background: linear-gradient(90deg, var(--surface-sunken) 25%, var(--line) 37%, var(--surface-sunken) 63%);\n  background-size: 400% 100%;\n  animation: ifp-shimmer 1.4s ease infinite;\n  border-radius: 6px;\n}\n@keyframes ifp-shimmer {\n  0% {\n    background-position: 100% 0;\n  }\n  100% {\n    background-position: -100% 0;\n  }\n}\n\n/* ============================================================================\n   APP SHELL — sidebar 256px + topbar (esqueleto base de toda tela autenticada)\n   ============================================================================ */\n.shell {\n  display: grid;\n  grid-template-columns: 256px minmax(0, 1fr);\n  min-height: 100vh;\n}\n.sidebar {\n  background: var(--surface);\n  border-right: 1px solid var(--line);\n  display: flex;\n  flex-direction: column;\n  padding: 16px 12px;\n  gap: 4px;\n  position: sticky;\n  top: 0;\n  height: 100vh;\n}\n/* faixa de identidade da unidade no topo da sidebar */\n.sidebar::before {\n  content: \"\";\n  position: absolute;\n  left: 0;\n  right: 0;\n  top: 0;\n  height: 3px;\n  background: linear-gradient(90deg, var(--unit), var(--unit-2));\n}\n.sidebar .sb-brand {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  padding: 6px 8px 16px;\n}\n.sidebar .sb-brand .symbol {\n  width: 32px;\n  height: 32px;\n  border-radius: 8px;\n  background: var(--logo-bg);\n  border: 1px solid var(--logo-ring);\n  display: grid;\n  place-items: center;\n  overflow: hidden;\n  flex: none;\n}\n.sidebar .sb-brand .symbol img {\n  width: 23px;\n  height: 23px;\n  object-fit: contain;\n}\n.sidebar .sb-brand b {\n  font-size: 14px;\n  font-weight: 800;\n  letter-spacing: -0.02em;\n  white-space: nowrap;\n}\n.sidebar .sb-group {\n  font-family: var(--font-mono);\n  font-size: 9.5px;\n  font-weight: 500;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--text-3);\n  padding: 14px 10px 6px;\n}\n.nav-item {\n  display: flex;\n  align-items: center;\n  gap: 11px;\n  padding: 9px 10px;\n  border-radius: var(--r-md);\n  font-size: 13.5px;\n  font-weight: 600;\n  color: var(--text-2);\n  text-decoration: none;\n  cursor: pointer;\n  transition: background var(--t-fast), color var(--t-fast);\n}\n.nav-item svg {\n  width: 17px;\n  height: 17px;\n  flex: none;\n  color: var(--text-3);\n}\n.nav-item:hover {\n  background: var(--surface-sunken);\n  color: var(--text);\n}\n.nav-item.on {\n  background: var(--accent-soft);\n  color: var(--accent);\n}\n.nav-item.on svg {\n  color: var(--accent);\n}\n.nav-item .count {\n  margin-left: auto;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--text-3);\n}\n.topbar {\n  position: sticky;\n  top: 0;\n  z-index: 20;\n  display: flex;\n  align-items: center;\n  gap: 16px;\n  padding: 12px 24px;\n  background: color-mix(in srgb, var(--surface) 88%, transparent);\n  backdrop-filter: blur(14px) saturate(1.3);\n  border-bottom: 1px solid var(--line);\n}\n.topbar .tb-title {\n  font-size: 15px;\n  font-weight: 800;\n  letter-spacing: -0.02em;\n  white-space: nowrap;\n}\n.topbar .spacer {\n  flex: 1;\n}\n.unit-switcher {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  border: 1px solid color-mix(in srgb, var(--unit) 34%, var(--line-strong));\n  background: color-mix(in srgb, var(--unit) 9%, var(--surface));\n  color: color-mix(in srgb, var(--unit) 60%, var(--text));\n  border-radius: var(--r-md);\n  padding: 7px 11px;\n  font-size: 12.5px;\n  font-weight: 700;\ it: contain; }\n      .top .brand b { font-size: 15px; font-weight: 800; letter-spacing: -0.02em; white-space: nowrap; }\n      .top .spacer { flex: 1; }\n      .wrap { max-width: 1160px; margin: 0 auto; padding: 30px 32px 90px; }\n      .intro .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); }\n      .intro h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.025em; margin: 8px 0 6px; }\n      .intro p { font-size: 14.5px; color: var(--text-2); max-width: 680px; line-height: 1.6; margin: 0; }\n      .sec-h { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); margin: 44px 0 18px; display: flex; align-items: center; gap: 12px; }\n      .sec-h::after { content: \"\"; flex: 1; height: 1px; background: var(--line); }\n\n      /* ===== MEDALHÃO (reutilizável) ===== */\n      .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 16px; }\n      .mcard {\n        background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg);\n        box-shadow: var(--shadow); padding: 26px 18px 20px; text-align: center;\n        display: flex; flex-direction: column; align-items: center; gap: 4px;\n      }\n      .medallion { position: relative; width: 116px; height: 116px; display: grid; place-items: center; margin-bottom: 12px; }\n      .medallion .ring {\n        position: absolute; inset: 0; border-radius: 50%;\n        background: conic-gradient(var(--unit) 0deg, var(--unit-2) 120deg, transparent 120deg, transparent 360deg);\n        -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #000 calc(100% - 5px));\n        mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #000 calc(100% - 5px));\n        animation: spin 1.5s linear infinite;\n      }\n      .medallion .disc {\n        position: relative; width: 92px; height: 92px; border-radius: 50%;\n        background: linear-gradient(140deg, var(--unit), var(--unit-2));\n        display: grid; place-items: center; overflow: hidden;\n        box-shadow: inset 0 2px 8px rgba(255,255,255,.22), inset 0 -8px 18px rgba(0,0,0,.14);\n      }\n      .medallion .disc::after { /* brilho sutil */\n        content: \"\"; position: absolute; inset: 0; background: radial-gradient(circle at 32% 26%, rgba(255,255,255,.35), transparent 45%);\n      }\n      .medallion .lion { width: 70px; height: 70px; object-fit: contain; position: relative; z-index: 2; }\n      .medallion .prop {\n        position: absolute; right: -2px; bottom: -2px; z-index: 3;\n        width: 38px; height: 38px; border-radius: 50%;\n        background: var(--surface); border: 1px solid var(--line);\n        display: grid; place-items: center; color: var(--unit);\n        box-shadow: var(--shadow);\n      }\n      .medallion .prop svg { width: 20px; height: 20px; }\n      .mcard .nm { font-size: 15px; font-weight: 800; letter-spacing: -0.01em; line-height: 1.18; }\n      .mcard .phrase { font-size: 12px; color: var(--text-3); margin-top: 3px; }\n      .mcard .pers { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--unit); margin-top: 8px; border: 1px solid color-mix(in srgb, var(--unit) 30%, transparent); border-radius: var(--r-full); padding: 3px 9px; }\n\n      /* ===== personalidades de movimento (no leão) ===== */\n      @keyframes spin { to { transform: rotate(360deg); } }\n      @keyframes heartbeat { 0%,28%,100% { transform: scale(1); } 12% { transform: scale(1.1); } 20% { transform: scale(1.02); } }\n      @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }\n      @keyframes hustle { 0%,100% { transform: translateX(0) rotate(0); } 25% { transform: translateX(-3px) rotate(-5deg); } 75% { transform: translateX(3px) rotate(5deg); } }\n      @keyframes wobble { 0%,100% { transform: rotate(-7deg) scale(1); } 50% { transform: rotate(7deg) scale(1.04); } }\n      @keyframes breathe { 0%,100% { transform: scale(0.98); } 50% { transform: scale(1.04); } }\n      .m-medico   .lion { animation: heartbeat 1.4s ease-in-out infinite; }\n      .m-capacitacao .lion { animation: bob 1.1s ease-in-out infinite; }\n      .m-esportivo .lion { animation: hustle 0.5s ease-in-out infinite; }\n      .m-recreativo .lion { animation: wobble 1s ease-in-out infinite; }\n      .m-poncio   .lion { animation: breathe 2.4s ease-in-out infinite; }\n      .m-social   .lion { animation: breathe 1.8s ease-in-out infinite; }\n      .m-esportivo .ring { animation-duration: 0.7s; }\n      .m-poncio .ring { animation-duration: 2.6s; }\n      .m-capacitacao .ring { animation-duration: 1.1s; }\n\n      /* ===== DEMO DE TRANSIÇÃO ===== */\n      .demo-stage { margin-top: 8px; display: grid; grid-template-columns: 260px 1fr; gap: 18px; }\n      .nav-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); box-shadow: var(--shadow); padding: 14px; }\n      .nav-card .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); padding: 4px 6px 10px; }\n      .nav-card button {\n        display: flex; align-items: center; gap: 10px; width: 100%; text-align: left;\n        background: transparent; border: 0; border-radius: var(--r-md); padding: 9px 10px;\n        font-family: inherit; font-size: 13.5px; font-weight: 600; color: var(--text-2); cursor: pointer;\n        transition: background var(--t-fast), color var(--t-fast);\n      }\n      .nav-card button:hover { background: var(--surface-sunken); color: var(--text); }\n      .nav-card button .sw { width: 12px; height: 12px; border-radius: 4px; flex: none; }\n      .stage-frame {\n        position: relative; overflow: hidden; border-radius: var(--r-lg); border: 1px solid var(--line);\n        background: var(--surface); box-shadow: var(--shadow); min-height: 360px;\n      }\n      .stage-frame .mock-top { display: flex; align-items: center; gap: 10px; padding: 14px 18px; border-bottom: 1px solid var(--line); }\n      .stage-frame .mock-top .mt-strip { position: absolute; left: 0; right: 0; top: 0; height: 3px; background: linear-gradient(90deg, var(--unit), var(--unit-2)); }\n      .stage-frame .mt-band { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; color: color-mix(in srgb, var(--unit) 62%, var(--text)); }\n      .stage-frame .mt-band .d { width: 16px; height: 16px; border-radius: 5px; background: linear-gradient(135deg, var(--unit), var(--unit-2)); }\n      .stage-frame .mock-body { padding: 22px; }\n      .stage-frame .mock-body h3 { margin: 0 0 4px; font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }\n      .stage-frame .mock-body p { margin: 0 0 16px; font-size: 13.5px; color: var(--text-3); }\n      .mock-kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }\n      .mock-kpis .k { border: 1px solid var(--line); border-radius: var(--r-md); padding: 13px; }\n      .mock-kpis .k .v { font-family: var(--font-mono); font-size: 22px; font-weight: 600; color: var(--unit); }\n      .mock-kpis .k .l { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); }\n\n      /* overlay de transição (cobre o frame) */\n      .t-overlay {\n        position: absolute; inset: 0; z-index: 10; display: grid; place-items: center; gap: 0;\n        background: linear-gradient(150deg, var(--unit), var(--unit-2));\n        opacity: 0; visibility: hidden;\n      }\n      .t-overlay.show { animation: ovIn .28s ease forwards; }\n      .t-overlay.hide { animation: ovOut .42s ease forwards; }\n      @keyframes ovIn { from { opacity: 0; visibility: visible; clip-path: circle(0% at 18% 22%); } to { opacity: 1; visibility: visible; clip-path: circle(150% at 18% 22%); } }\n      @keyframes ovOut { from { opacity: 1; visibility: visible; } to { opacity: 0; visibility: hidden; } }\n      .t-overlay .tl { display: flex; flex-direction: column; align-items: center; gap: 16px; }\n      .t-overlay .tl-medallion { position: relative; width: 104px; height: 104px; display: grid; place-items: center; }\n      .t-overlay .tl-medallion .tring { position: absolute; inset: 0; border-radius: 50%;\n        background: conic-gradient(#fff 0deg, rgba(255,255,255,.25) 130deg, transparent 130deg);\n        -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 4px));\n        mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 4px));\n        animation: spin 0.9s linear infinite; }\n      .t-overlay .tl-medallion .tlion { width: 64px; height: 64px; object-fit: contain; animation: bob 0.9s ease-in-out infinite; }\n      .t-overlay .tl-phrase { color: #fff; font-size: 14px; font-weight: 700; letter-spacing: 0.01em; }\n      .t-overlay .tl-dots { display: flex; gap: 6px; }\n      .t-overlay .tl-dots i { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.55); animation: blink 1s infinite; }\n      .t-overlay .tl-dots i:nth-child(2) { animation-delay: .15s; }\n      .t-overlay .tl-dots i:nth-child(3) { animation-delay: .3s; }\n      @keyframes blink { 0%,100% { opacity: .3; } 50% { opacity: 1; } }\n\n      @media (prefers-reduced-motion: reduce) {\n        .lion, .ring, .tlion, .tring, .tl-dots i { animation: none !important; }\n        .t-overlay.show { animation: none; opacity: 1; visibility: visible; }\n      }\n      @media (max-width: 760px) { .demo-stage { grid-template-columns: 1fr; } }\n    <\u002Fstyle>\n    \n  <\u002Fhead>\n  <body>\n    <div class=\"top\">\n      <div class=\"brand\"><span class=\"sym\"><img src=\"ba0b610a-fd7d-4b14-89b4-6b082cbbd31c\" alt=\"IFP\"><\u002Fspan><b>IFP Connect<\u002Fb><\u002Fdiv>\n      <span class=\"badge badge-default\">Mascote · loaders<\u002Fspan>\n      <span class=\"spacer\"><\u002Fspan>\n      <a class=\"btn btn-ghost btn-sm\" href=\"index.html\">← Design Kit<\u002Fa>\n      <button class=\"toggle-pill\" id=\"themeToggle\"><span class=\"dot\"><\u002Fspan><span id=\"themeLabel\">Claro<\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"wrap\">\n      <div class=\"intro\">\n        <div class=\"eyebrow\">Experimento · identidade em movimento<\u002Fdiv>\n        <h1>O leão veste a unidade 🦁<\u002Fh1>\n        <p>\n          Em vez de redesenhar o mascote (isso pede ilustrador), o leão real entra num <b>medalhão da cor da unidade<\u002Fb>,\n          com um <b>adereço<\u002Fb> em ícone e uma <b>personalidade de movimento própria<\u002Fb>. Mesmo mascote, seis humores —\n          perfeito como loader de transição entre páginas. Role até o fim pra testar a transição de verdade.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"sec-h\">Medalhões por unidade<\u002Fdiv>\n      <div class=\"gallery\" id=\"gallery\"><\u002Fdiv>\n\n      <div class=\"sec-h\">Transição de página · clique numa unidade<\u002Fdiv>\n      <div class=\"demo-stage\">\n        <div class=\"nav-card\">\n          <div class=\"lbl\">Navegar para<\u002Fdiv>\n          <div id=\"navBtns\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stage-frame\" id=\"stage\" data-unit=\"medico\">\n          <div class=\"mock-top\"><span class=\"mt-strip\"><\u002Fspan><span class=\"mt-band\"><span class=\"d\"><\u002Fspan><span id=\"stageUnit\">Centro Médico<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div class=\"mock-body\">\n            <h3 id=\"stageTitle\">Fila do dia<\u002Fh3>\n            <p id=\"stageSub\">Conteúdo da unidade carregado após a transição.<\u002Fp>\n            <div class=\"mock-kpis\">\n              <div class=\"k\"><div class=\"v\" id=\"k1\">42<\u002Fdiv><div class=\"l\">Hoje<\u002Fdiv><\u002Fdiv>\n              <div class=\"k\"><div class=\"v\" id=\"k2\">7<\u002Fdiv><div class=\"l\">Pendentes<\u002Fdiv><\u002Fdiv>\n              <div class=\"k\"><div class=\"v\" id=\"k3\">18<\u002Fdiv><div class=\"l\">24h<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- overlay injetado por JS -->\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <script>\n      // tema\n      (function () {\n        var html = document.documentElement, saved = localStorage.getItem(\"ifp-theme\");\n        if (saved) html.setAttribute(\"data-theme\", saved);\n        var b = document.getElementById(\"themeToggle\"), l = document.getElementById(\"themeLabel\");\n        function s() { l.textContent = html.getAttribute(\"data-theme\") === \"dark\" ? \"Escuro\" : \"Claro\"; } s();\n        b.onclick = function () { var d = html.getAttribute(\"data-theme\") === \"dark\"; html.setAttribute(\"data-theme\", d ? \"light\" : \"dark\"); localStorage.setItem(\"ifp-theme\", d ? \"light\" : \"dark\"); s(); };\n      })();\n\n      // ícones de adereço (line icons)\n      var ICON = {\n        medico: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 3v6a4 4 0 0 0 8 0V3\"/><path d=\"M9 13v3a5 5 0 0 0 10 0v-2\"/><circle cx=\"19\" cy=\"11\" r=\"2.4\"/><\u002Fsvg>',\n        capacitacao: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 10 12 5 2 10l10 5 10-5z\"/><path d=\"M6 12v5c3 2.5 9 2.5 12 0v-5\"/><\u002Fsvg>',\n        esportivo: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M2 12a10 10 0 0 1 14-9\"/><path d=\"M14 6a6 6 0 1 0 6 6\"/><circle cx=\"8\" cy=\"14\" r=\"3\"/><\u002Fsvg>',\n        recreativo: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"10\" r=\"7\"/><path d=\"M12 17v4M9 21h6\"/><path d=\"M9 9h.01M15 9h.01M9.5 12.5a3.5 3 0 0 0 5 0\"/><\u002Fsvg>',\n        poncio: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m3 8 4 3 5-6 5 6 4-3-2 11H5z\"/><\u002Fsvg>',\n        social: '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 21s-7-4.4-7-9a4 4 0 0 1 7-2.6A4 4 0 0 1 19 12c0 4.6-7 9-7 9z\"/><\u002Fsvg>'\n      };\n      var UNITS = [\n        { k: \"medico\", n: \"Centro Médico\", phrase: \"Preparando o prontuário…\", pers: \"Batimento\", title: \"Fila do dia\", sub: \"18 consultas nas próximas 24h.\", kpi: [\"42\", \"7\", \"18\"] },\n        { k: \"capacitacao\", n: \"Capacitação\", phrase: \"Carregando sua turma…\", pers: \"Pulinho\", title: \"Painel da turma\", sub: \"9 turmas ativas · 341 alunos.\", kpi: [\"9\", \"3\", \"82%\"] },\n        { k: \"esportivo\", n: \"Esportivo\", phrase: \"Aquecendo…\", pers: \"Enérgico\", title: \"Treino de hoje\", sub: \"Futsal sub-14 · presença 88%.\", kpi: [\"24\", \"88%\", \"5\"] },\n        { k: \"recreativo\", n: \"Recreativo\", phrase: \"Chegando pra brincar…\", pers: \"Brincalhão\", title: \"Como foi o dia\", sub: \"Turma Girassol · 18 crianças.\", kpi: [\"18\", \"12\", \"6\"] },\n        { k: \"poncio\", n: \"Pôncio Executivo\", phrase: \"Reunindo os números…\", pers: \"Sóbrio\", title: \"Visão geral\", sub: \"Agregado das 4 unidades.\", kpi: [\"1.284\", \"9\", \"82%\"] },\n        { k: \"social\", n: \"Serviço Social\", phrase: \"Organizando as fichas…\", pers: \"Acolhedor\", title: \"Triagens\", sub: \"9 triagens pendentes.\", kpi: [\"1.284\", \"9\", \"41\"] }\n      ];\n\n      // galeria de medalhões\n      document.getElementById(\"gallery\").innerHTML = UNITS.map(function (u) {\n        return '<div class=\"mcard m-' + u.k + '\" data-unit=\"' + u.k + '\">' +\n          '<div class=\"medallion\"><span class=\"ring\"><\u002Fspan><span class=\"disc\"><img class=\"lion\" src=\"' + window.__resources.lionWhite + '\" alt=\"\"/><\u002Fspan>' +\n          '<span class=\"prop\">' + ICON[u.k] + '<\u002Fspan><\u002Fdiv>' +\n          '<div class=\"nm\">' + u.n + '<\u002Fdiv><div class=\"phrase\">' + u.phrase + '<\u002Fdiv>' +\n          '<div class=\"pers\">' + u.pers + '<\u002Fdiv><\u002Fdiv>';\n      }).join(\"\");\n\n      // botões de navegação\n      document.getElementById(\"navBtns\").innerHTML = UNITS.map(function (u) {\n        return '<button data-k=\"' + u.k + '\" data-unit=\"' + u.k + '\"><span class=\"sw\" style=\"background:linear-gradient(135deg,var(--unit),var(--unit-2))\"><\u002Fspan>' + u.n + '<\u002Fbutton>';\n      }).join(\"\");\n\n      // transição\n      var stage = document.getElementById(\"stage\");\n      function navigate(u) {\n        var ov = document.createElement(\"div\");\n        ov.className = \"t-overlay show\";\n        ov.setAttribute(\"data-unit\", u.k);\n        ov.innerHTML = '<div class=\"tl\"><div class=\"tl-medallion\"><span class=\"tring\"><\u002Fspan><img class=\"tlion\" src=\"' + window.__resources.lionWhite + '\" alt=\"\"/><\u002Fdiv>' +\n          '<div class=\"tl-phrase\">' + u.phrase + '<\u002Fdiv><div class=\"tl-dots\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fdiv><\u002Fdiv>';\n        stage.appendChild(ov);\n        setTimeout(function () {\n          // troca o conteúdo \"por trás\" do overlay\n          stage.setAttribute(\"data-unit\", u.k);\n          document.getElementById(\"stageUnit\").textContent = u.n;\n          document.getElementById(\"stageTitle\").textContent = u.title;\n          document.getElementById(\"stageSub\").textContent = u.sub;\n          document.getElementById(\"k1\").textContent = u.kpi[0];\n          document.getElementById(\"k2\").textContent = u.kpi[1];\n          document.getElementById(\"k3\").textContent = u.kpi[2];\n        }, 700);\n        setTimeout(function () { ov.className = \"t-overlay hide\"; }, 1250);\n        setTimeout(function () { ov.remove(); }, 1700);\n      }\n      document.getElementById(\"navBtns\").addEventListener(\"click\", function (e) {\n        var b = e.target.closest(\"button\"); if (!b) return;\n        var u = UNITS.find(function (x) { return x.k === b.dataset.k; });\n        navigate(u);\n      });\n    <\u002Fscript>\n  \n\n<\u002Fbody><\u002Fhtml>"
  </script>
