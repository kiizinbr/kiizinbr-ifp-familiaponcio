  <circle cx="60" cy="11" r="2.1" fill="currentColor" stroke="none"/>
  <circle cx="72" cy="14" r="2.1" fill="currentColor" stroke="none"/>

  <!-- Juba: silhueta cheia em ondas Bezier simetricas -->
