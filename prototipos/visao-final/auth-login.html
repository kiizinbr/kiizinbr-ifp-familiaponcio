<!DOCTYPE html>
<html lang="pt-BR" data-salao="corte">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Entrar · IFP Connect</title>
<link rel="stylesheet" href="casa.css" />
</head>
<body data-tipo="limpo">
<span class="ribbon">Prototipo conceitual</span>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1">
  <div class="card" style="width:100%;max-width:400px;padding:34px 32px;text-align:center">

    <span class="medalhao" style="width:64px;height:64px;margin-bottom:16px"><span class="leao" style="width:44px;height:44px"><span class="brandmark"></span></span></span>

    <div class="titulo" style="font-size:15px;margin-bottom:2px">IFP Connect</div>
    <div class="desc" style="margin-bottom:26px">Instituto Família Poncio · acesso ao sistema</div>

    <form onsubmit="return false" style="text-align:left">
      <label class="campo"><span>E-mail institucional</span><input type="email" placeholder="nome@familiaponcio.org.br" value="" /></label>
      <label class="campo"><span>Senha</span><input type="password" placeholder="••••••••" /></label>

      <div style="display:flex;align-items:center;justify-content:space-between;margin:2px 0 20px">
        <label style="display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--corpo);cursor:pointer"><input type="checkbox" style="width:auto;margin:0" /> Manter conectado</label>
        <a href="auth-recuperar-senha.html" style="font-size:12.5px;font-weight:600;color:var(--unidade)">Esqueceu a senha?</a>
      </div>

      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:13px">Entrar</button>
    </form>

    <div class="desc" style="margin-top:22px;font-size:12px">Primeiro acesso? <a href="auth-primeiro-acesso.html" style="font-weight:600;color:var(--unidade)">Defina sua senha</a></div>
  </div>
</div>

<script src="casa-shell.js"></script>
</body>
</html>
