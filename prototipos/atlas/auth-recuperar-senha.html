<!DOCTYPE html>
<html lang="pt-BR" data-salao="corte">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Recuperar senha · IFP Connect</title>
<link rel="stylesheet" href="casa.css" />
</head>
<body data-tipo="limpo">
<span class="ribbon">Prototipo conceitual</span>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1">
  <div class="card" style="width:100%;max-width:400px;padding:34px 32px;text-align:center">

    <span class="medalhao" style="width:64px;height:64px;margin-bottom:16px"><span class="leao" style="width:44px;height:44px"><span class="brandmark"></span></span></span>

    <div class="titulo" style="font-size:15px;margin-bottom:6px">Recuperar senha</div>
    <div class="desc" style="margin-bottom:24px;line-height:1.5">Informe seu e-mail institucional. Enviaremos um link para você criar uma nova senha.</div>

    <form onsubmit="return false" style="text-align:left">
      <label class="campo"><span>E-mail institucional</span><input type="email" placeholder="nome@familiaponcio.org.br" /></label>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;margin-top:4px">Enviar link de recuperação</button>
    </form>

    <div class="card" style="margin-top:20px;background:var(--unidade-suave);border:0;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;text-align:left">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;color:var(--unidade-escuro);flex:0 0 auto;margin-top:1px"><path d="M4 4h16v16H4z"/><path d="M4 6l8 6 8-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <div style="font-size:12px;color:var(--unidade-escuro)">O link expira em 30 minutos. Se não encontrar o e-mail, verifique a caixa de spam.</div>
    </div>

    <div class="desc" style="margin-top:22px;font-size:12px"><a href="auth-login.html" style="font-weight:600;color:var(--unidade)">‹ Voltar para o login</a></div>
  </div>
</div>

<script src="casa-shell.js"></script>
</body>
</html>
